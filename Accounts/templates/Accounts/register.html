{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<h3>Register</h3>
<div class="container">
  <div class="col-8">

    <form method="POST" href="{% url 'register' %}" action="{% url 'blog_homepage' %}">
      {% csrf_token %}
        {{ form | crispy }}
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>

  </div>
</div>

{% endblock %}
