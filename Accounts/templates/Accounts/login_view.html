{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}

  <div class="container">
    <div class="col-6">

    <form method="POST" action="{% url 'login_view' %}">
      {% csrf_token %}
      {{ form|crispy }}

      <button type="submit" class="btn btn-primary">
          Log In
      </button>
    </form>

    </div>
  </div>

{% endblock %}
